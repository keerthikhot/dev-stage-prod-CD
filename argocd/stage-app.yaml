apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: my-app-stage
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/keerthikhot/dev-stage-prod-CD.git
    targetRevision: main
    path: apps/myapp/overlays/stage
  destination:
    server: https://kubernetes.default.svc
    namespace: stage
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
